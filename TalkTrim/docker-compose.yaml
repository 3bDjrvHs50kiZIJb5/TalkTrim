# 路径均相对本文件所在目录，可在任意目录执行 docker-auto.sh
services:
  talktrim:
    build:
      context: .
      dockerfile: Dockerfile
    image: talktrim:latest
    container_name: talktrim
    ports:
      - "${HOST_PORT:-5050}:80"
    environment:
      TZ: Asia/Shanghai
    working_dir: /app
    volumes:
      - ./Logs:/app/Logs
      - ./wwwroot/uploads:/app/wwwroot/uploads
      - ./wwwroot/avatars:/app/wwwroot/avatars
      - ./keys:/app/keys
      - ./neoadmin.db:/app/neoadmin.db
    restart: unless-stopped
    # 限制容器资源，避免 ffmpeg 压制时占满宿主机内存
    mem_limit: 4g
    memswap_limit: 4g
    cpus: "2"
